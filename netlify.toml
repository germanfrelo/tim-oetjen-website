# BUILD SETTINGS

[build]
command = "npm run build"
publish = "dist"

# REDIRECTS

# Netlify default subdomain

[[redirects]]
from = "https://timoetjen.netlify.app/*"
to = "https://timoetjen.eu/:splat"
status = 301
force = true

# Custom domain aliases (apex domains)

# www. variants are handled automatically at the Netlify platform level (unverified mechanism).
# The apex versions are declared here to force a redirect to the primary domain.

[[redirects]]
from = "https://traductorautonomo.com/*"
to = "https://timoetjen.eu/:splat"
status = 301
force = true

[[redirects]]
from = "https://traductorautonomo.es/*"
to = "https://timoetjen.eu/:splat"
status = 301
force = true

[[redirects]]
from = "https://traducteurindependant.com/*"
to = "https://timoetjen.eu/:splat"
status = 301
force = true

[[redirects]]
from = "https://traducteurindependant.fr/*"
to = "https://timoetjen.eu/:splat"
status = 301
force = true
